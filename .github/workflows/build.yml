name: "nix-build"
on:
  pull_request:
  push:
    branches:
    - master
  workflow_dispatch:
jobs:
  # Check is valid nix config.
  ci:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          accept-flake-config = true
    - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.lock', '**/*.nix') }}
        restore-prefixes-first-match: |
          nix-${{ runner.os }}-ci-
          nix-${{ runner.os }}-build-
        gc-max-store-size-linux: 3G
    - name: Check flake evaluation
      run: nix flake check --no-build
    - name: Evaluate activation packages
      run: |
        set -euo pipefail

        nix eval --raw ".#homeConfigurations.sk@wsl.activationPackage.drvPath"
  # Manual full build for profiles that may require slow package builds.
  # Also uploads the home-files tarball artifacts for each profile.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        profile:
        - sk@wsl
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          accept-flake-config = true
    - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-build-${{ matrix.profile }}-${{ hashFiles('flake.lock', '**/*.nix') }}
        restore-prefixes-first-match: |
          nix-${{ runner.os }}-build-${{ matrix.profile }}-
          nix-${{ runner.os }}-ci-
        gc-max-store-size-linux: 5G
    - name: Build activation package
      run: nix build ".#homeConfigurations.${{ matrix.profile }}.activationPackage"
    - name: Build home-files tarball
      run: |
        set -euo pipefail

        out_path="$(nix build --print-out-paths ".#homeConfigurations.${{ matrix.profile }}.config.home-files")"
        archive_name="home-files-${{ matrix.profile }}.tar.gz"

        tar \
          --create \
          --dereference \
          --gzip \
          --file "$archive_name" \
          --directory "$(dirname "$out_path")" \
          --transform "s#^$(basename "$out_path")#home-files-${{ matrix.profile }}#" \
          "$(basename "$out_path")"
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.0.1
      with:
        name: home-files-${{ matrix.profile }}
        path: home-files-${{ matrix.profile }}.tar.gz
        if-no-files-found: error
        compression-level: 0
