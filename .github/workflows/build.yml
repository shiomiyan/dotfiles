name: "nix-build"
on:
  pull_request:
  push:
    branches:
    - master
jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - run: nix build .#homeConfigurations.default.activationPackage
  home-files-artifacts:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      matrix:
        profile:
        - default
        - wsl
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Build home-files tarball
      run: |
        set -euo pipefail

        out_path="$(nix build --print-out-paths ".#homeConfigurations.${{ matrix.profile }}.config.home-files")"
        archive_name="home-files-${{ matrix.profile }}.tar.gz"

        tar \
          --create \
          --dereference \
          --gzip \
          --file "$archive_name" \
          --directory "$(dirname "$out_path")" \
          --transform "s#^$(basename "$out_path")#home-files-${{ matrix.profile }}#" \
          "$(basename "$out_path")"
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.0.1
      with:
        name: home-files-${{ matrix.profile }}
        path: home-files-${{ matrix.profile }}.tar.gz
        if-no-files-found: error
        compression-level: 0
