[helpers]

[default]
depends = []

[default.files]
"config/espanso"    = { target = "~/AppData/Roaming/espanso", type = "symbolic" }
"config/nvim"       = "~/AppData/Local/nvim"
"config/git"        = "~/.config/git"
"config/tig"        = "~/.config/tig"
"config/wezterm"    = "~/.config/wezterm"
"config/powershell" = "~/Documents/PowerShell"
"config/emacs"      = "~/AppData/Roaming/.emacs.d/"

[default.variables]

[settings]
default_target_type = "automatic"
